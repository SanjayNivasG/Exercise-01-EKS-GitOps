apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: payment-secret

  data:
  - secretKey: username
    remoteRef:
      key: payment-db-secret
      property: username

  - secretKey: password
    remoteRef:
      key: payment-db-secret
      property: password

